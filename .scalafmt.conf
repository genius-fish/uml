version = 3.10.4
runner.dialect = scala3

# Line length and wrapping
maxColumn = 100
assumeStandardLibraryStripMargin = true
includeCurlyBraceInSelectChains = false

# Alignment
align.preset = more
align.stripMargin = true
align.multiline = true
align.openParenCallSite = false
align.openParenDefnSite = false
align.tokens = [
  {code = "=>", owner = "Case"},
  {code = "extends", owner = "Defn.(Class|Trait|Object)"},
  {code = "//", owner = ".*"},
  {code = "{", owner = "Template"},
  {code = "}", owner = "Template"},
  {code = "%", owner = "Term.ApplyInfix"},
  {code = "%%", owner = "Term.ApplyInfix"},
  {code = "%%%", owner = "Term.ApplyInfix"},
  {code = "⇒", owner = "Case"},
  {code = "<-", owner = "Enumerator.Generator"},
  {code = "←", owner = "Enumerator.Generator"},
  {code = "=", owner = "(Enumerator.Val|Defn.(Va(l|r)|Def|Type))"}
]

# Indentation - Scala 3 style with significant indentation
indent.main = 2
indent.significant = 2
indent.callSite = 2
indent.ctrlSite = 2
indent.defnSite = 2
indent.ctorSite = 2
indent.caseSite = 2
indent.extendSite = 2
indent.withSiteRelativeToExtends = 2
indent.commaSiteRelativeToExtends = 2

# Rewrite rules for Scala 3
rewrite.rules = [
  PreferCurlyFors,
  RedundantBraces,
  RedundantParens,
  SortModifiers
]

rewrite.scala3.convertToNewSyntax = true
rewrite.scala3.removeOptionalBraces = true
rewrite.scala3.insertEndMarkerMinLines = 15
rewrite.scala3.removeEndMarkerMaxLines = 14

# Trailing commas
rewrite.trailingCommas.style = multiple
rewrite.trailingCommas.allowFolding = true

# Newlines
newlines.source = keep
newlines.topLevelStatementBlankLines = [
  {blanks = 1}
]
newlines.beforeCurlyLambdaParams = never
newlines.afterCurlyLambdaParams = never
newlines.implicitParamListModifierForce = [before]
newlines.avoidForSimpleOverflow = [punct, slc]

# Docstrings
docstrings.style = Asterisk
docstrings.wrap = no
docstrings.oneline = fold

# Spaces
spaces.inImportCurlyBraces = false
spaces.beforeContextBoundColon = Always
spaces.afterTripleEquals = true
spaces.inByNameTypes = true

# Line breaks
optIn.breakChainOnFirstMethodDot = true
optIn.configStyleArguments = true
verticalMultiline.atDefnSite = true
verticalMultiline.arityThreshold = 3
verticalMultiline.newlineAfterOpenParen = true

# Comments
comments.wrap = standalone
comments.wrapStandaloneSlcAsSlc = true

# Project-specific settings
project.git = true
project.excludeFilters = [
  "out/",
  "target/"
]

# Performance
runner.optimizer.forceConfigStyleOnOffset = 100
runner.optimizer.forceConfigStyleMinArgCount = 5

# ZIO-specific settings
binPack.literalArgumentLists = true
binPack.parentConstructors = Never

# Vertical alignment for ZIO effects
verticalAlignMultilineOperators = true

# Dangling parentheses
danglingParentheses.preset = true
danglingParentheses.callSite = true
danglingParentheses.defnSite = true
danglingParentheses.ctrlSite = true
danglingParentheses.tupleSite = true

# File overrides
fileOverride {
  "glob:**/test/**" {
    maxColumn = 120
  }
  "glob:**/*Spec.scala" {
    maxColumn = 120
  }
  "glob:**/package.scala" {
    rewrite.scala3.removeOptionalBraces = false
  }
}
